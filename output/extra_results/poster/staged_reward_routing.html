<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Staged Reward Routing Method Figure</title>
  <style>
    :root {
      --paper: #f7fafc;
      --ink: #0f172a;
      --muted: #475569;
      --line: #cbd5e1;
      --blue: #2563eb;
      --teal: #0f766e;
      --gold: #b45309;
      --red: #b91c1c;
      --slate: #334155;
      --green: #15803d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--paper);
      color: var(--ink);
      font-family: "Avenir Next", "Inter", "Helvetica Neue", Arial, sans-serif;
    }

    .figure-shell {
      width: min(100vw, 1700px);
      aspect-ratio: 1700 / 1000;
      background: var(--paper);
      border: 0;
      box-shadow: none;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .title {
      font-size: 34px;
      font-weight: 850;
      letter-spacing: 0;
      fill: var(--ink);
    }

    .kicker {
      font-size: 18px;
      font-weight: 750;
      letter-spacing: 0;
      text-transform: uppercase;
      fill: var(--teal);
    }

    .caption {
      font-size: 21px;
      font-weight: 560;
      fill: var(--muted);
    }

    .stage-no {
      font-size: 17px;
      font-weight: 850;
      fill: #ffffff;
    }

    .stage-title {
      font-size: 25px;
      font-weight: 850;
      fill: var(--ink);
    }

    .stage-title.dark {
      fill: #f8fafc;
    }

    .stage-sub {
      font-size: 17px;
      font-weight: 560;
      fill: var(--muted);
    }

    .stage-sub.dark {
      fill: #dbeafe;
    }

    .chip-text {
      font-size: 15px;
      font-weight: 720;
      fill: var(--slate);
    }

    .small {
      font-size: 14px;
      font-weight: 560;
      fill: var(--muted);
    }

    .mask-name {
      font-size: 18px;
      font-weight: 820;
      fill: var(--ink);
    }

    .mask-cond {
      font-size: 14px;
      font-weight: 650;
      fill: var(--muted);
    }

    .formula {
      font-size: 36px;
      font-weight: 780;
      fill: var(--ink);
    }

    .formula-note {
      font-size: 19px;
      font-weight: 560;
      fill: var(--muted);
    }

    .mono {
      font-family: "SFMono-Regular", "Menlo", "Consolas", monospace;
    }
  </style>
</head>
<body>
  <main class="figure-shell" aria-label="Staged Reward Routing method figure">
    <svg viewBox="0 0 1700 1000" role="img" aria-labelledby="fig-title fig-desc">
      <title id="fig-title">Staged Reward Routing for Full-Body Locomotion</title>
      <desc id="fig-desc">A left-to-right method diagram showing stable locomotion, command-based reward routing, and arm-swing shaping.</desc>

      <defs>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
          <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14" />
        </filter>

        <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
          <path d="M 0 1 L 12 7 L 0 13 z" fill="#64748b" />
        </marker>

        <marker id="arrowTeal" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
          <path d="M 0 1 L 12 7 L 0 13 z" fill="#0f766e" />
        </marker>

        <linearGradient id="policyGrad" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stop-color="#16324f" />
          <stop offset="100%" stop-color="#0f172a" />
        </linearGradient>

        <linearGradient id="routingGrad" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stop-color="#ecfeff" />
          <stop offset="100%" stop-color="#eef2ff" />
        </linearGradient>

        <pattern id="dotGrid" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="2" cy="2" r="1.2" fill="#cbd5e1" opacity="0.55" />
        </pattern>
      </defs>

      <rect width="1700" height="1000" fill="#f7fafc" />
      <rect x="0" y="0" width="1700" height="1000" fill="url(#dotGrid)" opacity="0.55" />

      <text x="70" y="76" class="kicker">Figure 2 · Method</text>
      <text x="70" y="119" class="title">Staged Reward Routing for Full-Body Arm-Swing Locomotion</text>
      <text x="70" y="154" class="caption">Reward terms are activated by command regimes so arm-swing objectives do not destabilize the base gait.</text>

      <g filter="url(#softShadow)">
        <rect x="58" y="222" width="245" height="310" rx="18" fill="url(#policyGrad)" />
        <circle cx="92" cy="258" r="17" fill="#2563eb" />
        <text x="83" y="264" class="stage-no">0</text>
        <text x="88" y="308" class="stage-title dark">Full-body H1</text>
        <text x="88" y="340" class="stage-sub dark">19DoF action space</text>
        <text x="88" y="368" class="stage-sub dark">PPO in Genesis</text>

        <g transform="translate(108 400)" stroke="#dbeafe" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.95">
          <circle cx="55" cy="0" r="24" stroke-width="7" />
          <path d="M55 26 L55 94" />
          <path d="M55 50 L15 85" />
          <path d="M55 50 L95 85" />
          <path d="M55 94 L22 150" />
          <path d="M55 94 L88 150" />
        </g>

        <rect x="87" y="484" width="187" height="26" rx="13" fill="#1e40af" opacity="0.75" />
        <text x="124" y="503" class="stage-sub dark">joint targets</text>
      </g>

      <path d="M 322 377 L 378 377" stroke="#64748b" stroke-width="5" fill="none" marker-end="url(#arrow)" />

      <g filter="url(#softShadow)">
        <rect x="392" y="222" width="285" height="310" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
        <circle cx="426" cy="258" r="17" fill="#64748b" />
        <text x="418" y="264" class="stage-no">1</text>
        <text x="422" y="306" class="stage-title">Locomotion</text>
        <text x="422" y="336" class="stage-title">foundation</text>
        <text x="422" y="371" class="stage-sub">preserve stable walking</text>
        <text x="422" y="396" class="stage-sub">with upper body constrained</text>

        <rect x="422" y="427" width="94" height="32" rx="16" fill="#eef2ff" />
        <text x="442" y="448" class="chip-text">v<tspan baseline-shift="sub">x</tspan> track</text>
        <rect x="526" y="427" width="112" height="32" rx="16" fill="#eef2ff" />
        <text x="545" y="448" class="chip-text">heading</text>
        <rect x="422" y="471" width="105" height="32" rx="16" fill="#f1f5f9" />
        <text x="441" y="492" class="chip-text">contact</text>
        <rect x="538" y="471" width="100" height="32" rx="16" fill="#f1f5f9" />
        <text x="555" y="492" class="chip-text">smooth</text>
      </g>

      <path d="M 696 377 L 752 377" stroke="#64748b" stroke-width="5" fill="none" marker-end="url(#arrow)" />

      <g filter="url(#softShadow)">
        <rect x="750" y="198" width="470" height="358" rx="22" fill="url(#routingGrad)" stroke="#99d5cf" stroke-width="2.5" />
        <circle cx="788" cy="235" r="18" fill="#0f766e" />
        <text x="780" y="241" class="stage-no">2</text>
        <text x="816" y="242" class="stage-title">Command reward routing</text>
        <text x="816" y="274" class="stage-sub">masks select one reward family at each step</text>

        <rect x="790" y="304" width="390" height="58" rx="14" fill="#ffffff" stroke="#67b8b0" stroke-width="2" />
        <g aria-label="mode mask belongs to stand, walk, or straight">
          <text x="826" y="340" class="mask-name mono">m(c<tspan baseline-shift="sub">t</tspan>) ∈</text>
          <rect x="958" y="317" width="66" height="30" rx="15" fill="#e0f2fe" stroke="#bae6fd" />
          <text x="974" y="338" class="chip-text">stand</text>
          <rect x="1033" y="317" width="58" height="30" rx="15" fill="#dcfce7" stroke="#bbf7d0" />
          <text x="1049" y="338" class="chip-text">walk</text>
          <rect x="1100" y="317" width="72" height="30" rx="15" fill="#ffedd5" stroke="#fed7aa" />
          <text x="1112" y="338" class="chip-text">straight</text>
        </g>

        <g>
          <rect x="790" y="391" width="390" height="42" rx="10" fill="#f8fafc" stroke="#cbd5e1" />
          <text x="810" y="418" class="mask-name">Stand</text>
          <text x="945" y="418" class="mask-cond mono">||v<tspan baseline-shift="sub">cmd</tspan>|| ≤ 0.10</text>
          <text x="1110" y="418" class="mask-cond mono">R<tspan baseline-shift="sub">stand</tspan></text>

          <rect x="790" y="443" width="390" height="42" rx="10" fill="#f8fafc" stroke="#cbd5e1" />
          <text x="810" y="470" class="mask-name">Walk</text>
          <text x="945" y="470" class="mask-cond mono">||v<tspan baseline-shift="sub">cmd</tspan>|| &gt; 0.20</text>
          <text x="1110" y="470" class="mask-cond mono">R<tspan baseline-shift="sub">walk</tspan></text>

          <rect x="790" y="495" width="390" height="42" rx="10" fill="#fff7ed" stroke="#fed7aa" />
          <text x="810" y="522" class="mask-name">Straight</text>
          <text x="945" y="522" class="mask-cond mono">v<tspan baseline-shift="sub">x</tspan> &gt; 0.22, straight</text>
          <text x="1110" y="522" class="mask-cond mono">R<tspan baseline-shift="sub">arm</tspan></text>
        </g>
      </g>

      <path d="M 1238 377 L 1262 377" stroke="#64748b" stroke-width="5" fill="none" marker-end="url(#arrow)" />

      <g filter="url(#softShadow)">
        <rect x="1276" y="222" width="272" height="310" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2" />
        <circle cx="1310" cy="258" r="17" fill="#b45309" />
        <text x="1302" y="264" class="stage-no">3</text>
        <text x="1306" y="306" class="stage-title">Arm-swing</text>
        <text x="1306" y="336" class="stage-title">shaping</text>
        <text x="1306" y="371" class="stage-sub">strengthen shoulder-pitch</text>
        <text x="1306" y="396" class="stage-sub">motion after gait is stable</text>

        <path d="M 1350 440 C 1394 390, 1432 390, 1473 440" stroke="#b45309" stroke-width="8" fill="none" stroke-linecap="round" />
        <path d="M 1350 440 C 1394 490, 1432 490, 1473 440" stroke="#b45309" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.45" />
        <circle cx="1345" cy="440" r="9" fill="#b45309" />
        <circle cx="1478" cy="440" r="9" fill="#b45309" />

        <rect x="1306" y="473" width="92" height="30" rx="15" fill="#ffedd5" />
        <text x="1323" y="493" class="chip-text">phase</text>
        <rect x="1408" y="473" width="95" height="30" rx="15" fill="#ffedd5" />
        <text x="1422" y="493" class="chip-text">amplitude</text>
      </g>

      <g filter="url(#softShadow)">
        <rect x="115" y="647" width="1570" height="210" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
        <text x="153" y="703" class="stage-title">Routed objective</text>
        <text x="153" y="754" class="formula mono">
          R<tspan baseline-shift="sub">t</tspan> =
          <tspan fill="#2563eb">R<tspan baseline-shift="sub">shared</tspan></tspan>
          + m<tspan baseline-shift="sub">stand</tspan><tspan fill="#64748b">R<tspan baseline-shift="sub">stand</tspan></tspan>
          + m<tspan baseline-shift="sub">walk</tspan><tspan fill="#0f766e">R<tspan baseline-shift="sub">walk</tspan></tspan>
          + m<tspan baseline-shift="sub">straight</tspan><tspan fill="#b45309">R<tspan baseline-shift="sub">arm</tspan></tspan>
          − <tspan fill="#b91c1c">C<tspan baseline-shift="sub">upper</tspan></tspan>
        </text>

        <line x1="153" y1="789" x2="1648" y2="789" stroke="#e2e8f0" stroke-width="2" />

        <g transform="translate(153 820)">
          <circle cx="11" cy="11" r="8" fill="#2563eb" />
          <text x="31" y="17" class="formula-note">shared rewards stay active: velocity, heading, contact, smoothness</text>
        </g>
        <g transform="translate(892 820)">
          <circle cx="11" cy="11" r="8" fill="#b45309" />
          <text x="31" y="17" class="formula-note">arm-swing terms activate mainly during straight walking</text>
        </g>
      </g>

      <text x="115" y="914" class="caption">
        <tspan x="115" dy="0">The staged protocol preserves the locomotion solution before strengthening upper-body expressiveness.</tspan>
        <tspan x="115" dy="31">Robustness is reported separately in the perturbation results, not mixed into the reward-routing pipeline.</tspan>
      </text>
    </svg>
  </main>
</body>
</html>
